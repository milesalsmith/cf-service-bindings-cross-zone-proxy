name = "proxy-production-good"
main = "src/index.ts"
compatibility_date = "2024-09-23"
workers_dev = true

# Recommended pattern: the app worker is declared as a Service Binding.
# Bytes do not leave the runtime, so they are not billed as Data Transfer
# and the call is not billed as a sub-request.
[[services]]
binding = "APP_REGION_1"
service = "app-region-1"

# Second binding to the OpenNext / Next.js variant of the same worker.
# Demonstrates that a Next.js app deployed via @opennextjs/cloudflare can
# be the callee of a Service Binding -- the producer side of Andrew's
# open question from the meeting notes.
[[services]]
binding = "APP_REGION_1_NEXT"
service = "app-region-1-next"

[[kv_namespaces]]
binding = "TENANTS"
id = "<your-tenants-kv-namespace-id>"
